name: Cricket Auction Workflow

on:
  push:
    branches:
      - main

jobs:
  run-project:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run Application
        run: node app.js